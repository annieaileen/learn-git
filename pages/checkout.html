<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-600">ร้านอาหารตามสั่ง</h1>
            <ul class="flex space-x-4">

    <div class="container mx-auto px-4 py-8">
        <h2 class="text-3xl font-bold mb-6">ชำระเงิน</h2>
        <form id="checkout-form">

            <input type="tel" placeholder="เบอร์โทร" class="w-full p-3 border rounded-lg mb-4" required>
            <button type="submit" class="bg-green-500 text-white px-6 py-3 rounded-lg w-full">ยืนยันคำสั่งซื้อ</button>
        </form>
    </div>
    <script src="../script.js"></script>
